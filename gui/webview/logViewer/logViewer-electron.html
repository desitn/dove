<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Viewer</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../assets/fontawesome/all.min.css">
</head>
<body>
    <div class="log-viewer-container" id="logViewerContainer">
        <!-- Empty State -->
        <div class="empty-state-container" id="emptyStateContainer">
            <div class="empty-state-content">
                <div class="empty-state-icon">
                    <i class="fa-solid fa-file-lines"></i>
                </div>
                <div class="empty-state-title">Log Viewer</div>
                <div class="empty-state-desc">Select a log file to view its contents</div>
                <div class="empty-state-actions">
                    <button class="btn btn-primary" id="btnSelectLogFile">
                        <i class="fa-solid fa-folder-open"></i> Select File
                    </button>
                </div>
                <div class="empty-state-tips">
                    <p>Supported formats: .log, .txt, .csv</p>
                </div>
            </div>
        </div>

        <!-- Header -->
        <div class="header" id="headerBar" style="display: none;">
            <div class="file-info">
                <span class="file-name" id="fileName">-</span>
                <span class="file-stats" id="fileStats">-</span>
            </div>
            <div class="toolbar">
                <button class="btn btn-icon" id="btnSearch" title="Search (Ctrl+F)">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
                <button class="btn btn-icon" id="btnFilter" title="Filter (Ctrl+H)">
                    <i class="fa-solid fa-filter"></i>
                </button>
                <button class="btn btn-icon" id="btnMarkbook" title="Markbook (Ctrl+B)">
                    <i class="fa-solid fa-bookmark"></i>
                </button>
                <button class="btn btn-icon" id="btnClearHighlights" title="Clear Highlights">
                    <i class="fa-solid fa-palette"></i>
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content" id="mainContent" style="display: none;">
            <!-- Search Panel -->
            <div class="search-panel" id="searchPanel">
                <div class="search-header">
                    <input type="text" class="search-input" id="searchInput" placeholder="Search...">
                    <button class="btn btn-icon regex-toggle-btn" id="regexToggleBtn" title="Use Regex">
                        <i class="fa-solid fa-asterisk"></i>
                    </button>
                    <button class="btn btn-icon" id="btnCloseSearch">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                <div class="search-results" id="searchResults"></div>
            </div>

            <!-- Resize Handle -->
            <div class="resize-handle" id="resizeHandle"></div>

            <!-- Filter Panel -->
            <div class="filter-panel" id="filterPanel">
                <div class="filter-header">
                    <input type="text" class="filter-input" id="filterInput" placeholder="Filter...">
                    <button class="btn btn-icon regex-toggle-btn" id="filterRegexToggleBtn" title="Use Regex">
                        <i class="fa-solid fa-asterisk"></i>
                    </button>
                    <button class="btn btn-icon" id="btnCloseFilter">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
            </div>

            <!-- Content -->
            <div class="content-wrapper">
                <div class="lines-container" id="linesContainer"></div>
            </div>

            <!-- Markbook Panel -->
            <div class="markbook-panel" id="markbookPanel">
                <div class="markbook-header">
                    <span>Markbook</span>
                    <button class="btn btn-icon" id="btnCloseMarkbook">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                <div class="markbook-list" id="markbookList"></div>
            </div>
        </div>

        <!-- Notification -->
        <div class="notification" id="notification"></div>
    </div>
</body>
</html>
